<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="400" fill="#fafafa"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Efficiency–Accuracy Tradeoff (FlightPlanner)</text>

  <!-- Ideal quadrant -->
  <rect x="80" y="80" width="148" height="100" fill="#ecfdf5"/>
  <text x="116" y="93" text-anchor="middle" font-size="8.5" fill="#059669" font-weight="600">Ideal:</text>
  <text x="116" y="104" text-anchor="middle" font-size="8.5" fill="#059669" font-weight="600">high SR,</text>
  <text x="116" y="115" text-anchor="middle" font-size="8.5" fill="#059669" font-weight="600">low CPS</text>

  <!-- Axes -->
  <line x1="80" y1="320" x2="720" y2="320" stroke="#94a3b8" stroke-width="1.3"/>
  <line x1="80" y1="80" x2="80" y2="320" stroke="#94a3b8" stroke-width="1.3"/>

  <!-- X axis labels -->
  <text x="80" y="336" text-anchor="middle" font-size="9.5" fill="#94a3b8">0</text>
  <text x="227" y="336" text-anchor="middle" font-size="9.5" fill="#94a3b8">15</text>
  <text x="375" y="336" text-anchor="middle" font-size="9.5" fill="#94a3b8">30</text>
  <text x="523" y="336" text-anchor="middle" font-size="9.5" fill="#94a3b8">45</text>
  <text x="670" y="336" text-anchor="middle" font-size="9.5" fill="#94a3b8">60</text>
  <text x="400" y="358" text-anchor="middle" font-size="11.5" fill="#1e293b">Cost-per-Success (CPS) — lower is better ←</text>

  <!-- Y axis labels -->
  <text x="70" y="324" text-anchor="end" font-size="9.5" fill="#94a3b8">0.0</text>
  <text x="70" y="204" text-anchor="end" font-size="9.5" fill="#94a3b8">0.5</text>
  <text x="70" y="84" text-anchor="end" font-size="9.5" fill="#94a3b8">1.0</text>
  <text x="40" y="200" text-anchor="middle" font-size="11.5" fill="#1e293b" transform="rotate(-90 40 200)">Success Rate — higher is better ↑</text>

  <!-- gridlines -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#eef2f6" stroke-width="1"/>
  <line x1="227" y1="80" x2="227" y2="320" stroke="#eef2f6" stroke-width="1"/>

  <!-- dashed efficiency frontier -->
  <path d="M 155.9 165.8 L 196 130.4 L 230 127.4" fill="none" stroke="#cbd5e1" stroke-width="1.3" stroke-dasharray="5,4"/>

  <!-- Points -->
  <!-- Random -->
  <circle cx="650" cy="297" r="6" fill="#94a3b8"/>
  <text x="650" y="313" text-anchor="middle" font-size="9.5" fill="#64748b">Random</text>

  <!-- RuleBased -->
  <circle cx="184" cy="147" r="8" fill="#94a3b8"/>
  <text x="200" y="155" text-anchor="start" font-size="9.5" fill="#64748b">RuleBased</text>

  <!-- LoRA supervised -->
  <circle cx="195" cy="130" r="8" fill="#94a3b8"/>
  <text x="195" y="106" text-anchor="middle" font-size="9.5" fill="#64748b">LoRA (sup.)</text>

  <!-- PPO -->
  <circle cx="230" cy="127" r="8" fill="#94a3b8"/>
  <text x="244" y="135" text-anchor="start" font-size="9.5" fill="#64748b">PPO</text>

  <!-- LoRA-Guided PPO highlighted -->
  <circle cx="156" cy="166" r="11" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
  <circle cx="156" cy="166" r="3.5" fill="#4f46e5"/>
  <text x="156" y="195" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4f46e5">LoRA-Guided PPO</text>

  <!-- annotation -->
  <rect x="430" y="200" width="270" height="48" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/>
  <text x="565" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">Lowest CPS (7.71) —</text>
  <text x="565" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#4f46e5">cost/success tradeoff</text>

  <!-- note on excluded outliers -->
  <text x="400" y="378" text-anchor="middle" font-size="9.5" fill="#94a3b8" font-style="italic">CapabilityMatch &amp; CostOpt-Oracle omitted (0.00 success rate, CPS &gt; 600) — see full tables below</text>

  <text x="400" y="392" text-anchor="middle" font-size="10.5" fill="#64748b" font-style="italic">As reported in the paper · LoRA-Guided PPO achieves lowest cost-per-success at reduced task success</text>
</svg>
