<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="340" fill="#fafafa"/>

  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Cost-Aware Multi-Agent Orchestration</text>
  <text x="369" y="50" text-anchor="middle" font-size="10" fill="#64748b">selects z_t ∈ {0,1}^m</text>

  <!-- Task box -->
  <rect x="20" y="90" width="120" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="80" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Multi-step Task</text>
  <text x="80" y="134" text-anchor="middle" font-size="11" fill="#64748b">state s_t</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="120" x2="188" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Allocator box (highlighted) -->
  <rect x="190" y="85" width="150" height="70" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="265" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Cost-Aware</text>
  <text x="265" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Allocator</text>
  <text x="265" y="145" text-anchor="middle" font-size="11" fill="#64748b">policy π_θ</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="120" x2="398" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent pool -->
  <rect x="400" y="60" width="220" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="510" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Agent Pool</text>

  <g font-size="10.5" fill="#1e293b">
    <rect x="412" y="86" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="443" y="103" text-anchor="middle">Planner</text>

    <rect x="480" y="86" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="511" y="103" text-anchor="middle">Search</text>

    <rect x="548" y="86" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="579" y="103" text-anchor="middle">Validator</text>

    <rect x="412" y="118" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="443" y="135" text-anchor="middle">Retriever</text>

    <rect x="480" y="118" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="511" y="135" text-anchor="middle">Calculator</text>

    <rect x="548" y="118" width="62" height="26" rx="5" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="579" y="135" text-anchor="middle">Browser</text>
  </g>
  <text x="510" y="160" text-anchor="middle" font-size="10.5" fill="#64748b">cost c_i per call</text>
  <text x="510" y="176" text-anchor="middle" font-size="10.5" fill="#64748b">m heterogeneous sub-agents</text>

  <!-- Arrow 3 -->
  <line x1="620" y1="120" x2="668" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Outcomes box -->
  <rect x="670" y="75" width="110" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="725" y="93" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Outcomes</text>
  <text x="725" y="115" text-anchor="middle" font-size="11" fill="#059669" font-weight="600">Success S_t</text>
  <text x="725" y="133" text-anchor="middle" font-size="11" fill="#64748b">Quality Q_t</text>
  <text x="725" y="151" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">Cost Σ c_i z_i</text>

  <!-- Feedback arc -->
  <path d="M 725 178 C 725 250, 265 250, 265 158" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <rect x="180" y="222" width="440" height="30" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
  <text x="400" y="241" text-anchor="middle" font-size="11.5" fill="#1e293b" font-weight="600">r_t = α S_t + β Q_t − λ Σ c_i z_i − γ ‖z_t‖₀</text>

  <!-- Bottom note -->
  <text x="400" y="300" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Goal: maximize task success while minimizing per-step compute and monetary cost</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
