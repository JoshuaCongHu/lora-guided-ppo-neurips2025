<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="800" height="420" fill="#fafafa"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Three Allocation Methods</text>

  <!-- Panel 1: PPO Baseline -->
  <g>
    <rect x="30" y="55" width="240" height="330" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="150" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">PPO Baseline</text>
    <line x1="50" y1="96" x2="250" y2="96" stroke="#e2e8f0" stroke-width="1"/>

    <rect x="55" y="112" width="190" height="34" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="150" y="133" text-anchor="middle" font-size="11" fill="#1e293b">State s_t</text>

    <line x1="150" y1="146" x2="150" y2="164" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="55" y="166" width="190" height="34" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="150" y="187" text-anchor="middle" font-size="11" fill="#1e293b">Policy π_θ / Encoder φ_θ</text>

    <line x1="150" y1="200" x2="150" y2="218" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="55" y="220" width="190" height="34" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="150" y="241" text-anchor="middle" font-size="10.5" fill="#1e293b">Bernoulli logits (per agent)</text>

    <line x1="150" y1="254" x2="150" y2="272" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="55" y="274" width="190" height="34" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="150" y="295" text-anchor="middle" font-size="11" fill="#1e293b">Agent subset z_t</text>

    <line x1="150" y1="308" x2="150" y2="326" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="55" y="328" width="190" height="34" rx="6" fill="#fafafa" stroke="#e2e8f0"/>
    <text x="150" y="349" text-anchor="middle" font-size="11" fill="#1e293b">Cost-aware reward r_t</text>

    <text x="150" y="402" text-anchor="middle" font-size="9.5" fill="#64748b">Trains all params from scratch</text>
  </g>

  <!-- Panel 2: Supervised LoRA -->
  <g>
    <rect x="280" y="55" width="240" height="330" rx="10" fill="#f5f7ff" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="400" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Supervised LoRA</text>
    <line x1="300" y1="96" x2="500" y2="96" stroke="#c7d2fe" stroke-width="1"/>

    <rect x="305" y="112" width="190" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="400" y="133" text-anchor="middle" font-size="11" fill="#1e293b">Heuristic traces</text>

    <line x1="400" y1="146" x2="400" y2="164" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="305" y="166" width="190" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="400" y="187" text-anchor="middle" font-size="10.5" fill="#1e293b">Frozen W + LoRA A·B</text>

    <line x1="400" y1="200" x2="400" y2="218" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="305" y="220" width="190" height="44" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="400" y="237" text-anchor="middle" font-size="10.5" fill="#1e293b">Cost-aware loss L_sup</text>
    <text x="400" y="252" text-anchor="middle" font-size="9" fill="#64748b">BCE + λ₁‖p‖₁ + λc Σc_i p_i</text>

    <line x1="400" y1="264" x2="400" y2="282" stroke="#94a3b8" stroke-width="1.3" marker-end="url(#arrowM)"/>

    <rect x="305" y="284" width="190" height="34" rx="6" fill="#ffffff" stroke="#c7d2fe"/>
    <text x="400" y="305" text-anchor="middle" font-size="11" fill="#1e293b">Agent subset z_t</text>

    <text x="400" y="345" text-anchor="middle" font-size="9.5" fill="#64748b">Parameter-efficient</text>
    <text x="400" y="360" text-anchor="middle" font-size="9.5" fill="#64748b">Strong cost priors</text>
    <text x="400" y="375" text-anchor="middle" font-size="9.5" fill="#64748b">No sequential credit assignment</text>
  </g>

  <!-- Panel 3: LoRA-Guided PPO (highlighted, our method) -->
  <g>
    <rect x="530" y="55" width="240" height="330" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <rect x="660" y="62" width="98" height="22" rx="11" fill="#4f46e5"/>
    <text x="709" y="77" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">OUR METHOD</text>

    <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">LoRA-Guided PPO</text>
    <line x1="550" y1="110" x2="750" y2="110" stroke="#c7d2fe" stroke-width="1"/>

    <rect x="555" y="124" width="190" height="34" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.3"/>
    <text x="650" y="145" text-anchor="middle" font-size="10" fill="#1e293b">Supervised LoRA (warm start)</text>

    <line x1="650" y1="158" x2="650" y2="176" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowAccent)"/>

    <rect x="555" y="178" width="190" height="44" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.3"/>
    <text x="650" y="195" text-anchor="middle" font-size="10" fill="#1e293b">PPO updates confined to</text>
    <text x="650" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">LoRA subspace</text>

    <line x1="650" y1="222" x2="650" y2="240" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowAccent)"/>

    <rect x="555" y="242" width="190" height="34" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.3"/>
    <text x="650" y="263" text-anchor="middle" font-size="10" fill="#1e293b">Efficient + adaptive policy</text>

    <line x1="650" y1="276" x2="650" y2="294" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arrowAccent)"/>

    <rect x="555" y="296" width="190" height="34" rx="6" fill="#ffffff" stroke="#4f46e5" stroke-width="1.3"/>
    <text x="650" y="317" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Agent subset z_t</text>

    <text x="650" y="350" text-anchor="middle" font-size="9.5" fill="#1e293b" font-weight="600">✓ Sample-efficient</text>
    <text x="650" y="365" text-anchor="middle" font-size="9.5" fill="#1e293b" font-weight="600">✓ Budget-aware</text>
    <text x="650" y="380" text-anchor="middle" font-size="9.5" fill="#1e293b" font-weight="600">✓ Sequential credit assignment</text>
  </g>

  <defs>
    <marker id="arrowM" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAccent" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#4f46e5"/>
    </marker>
  </defs>
</svg>
